<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Durée écoulée</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --surface:#15151a;
    --surface-2:#1c1c22;
    --red:#d62839;
    --red-bright:#ff4f5e;
    --text:#f5f3ef;
    --muted:#8c8c93;
    --border:rgba(214,40,57,0.18);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background-color:var(--bg);
    background-image:radial-gradient(circle at 50% -10%, rgba(214,40,57,0.10), transparent 60%);
    font-family:'Jost', sans-serif;
    color:var(--text);
  }

  .page{
    width:100%;
    max-width:440px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .card{
    background:linear-gradient(160deg, var(--surface-2), var(--surface));
    border:1px solid var(--border);
    border-radius:20px;
    padding:32px 28px;
    box-shadow:0 24px 60px -24px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.02);
  }

  .eyebrow{
    margin:0 0 6px;
    font-size:12px;
    font-weight:500;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--red-bright);
  }

  .title{
    margin:0 0 28px;
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:34px;
    letter-spacing:0.01em;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:16px;
  }

  .field label{
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.18em;
    text-transform:uppercase;
  }

  .field input[type="date"]{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.08);
    background:var(--surface);
    color:var(--text);
    font-family:'Jost', sans-serif;
    font-size:16px;
    transition:border-color .2s, box-shadow .2s;
  }

  .field input[type="date"]:focus{
    outline:none;
    border-color:var(--red);
    box-shadow:0 0 0 3px rgba(214,40,57,0.18);
  }

  .error{
    min-height:18px;
    margin:-6px 0 12px;
    font-size:13px;
    color:var(--red-bright);
  }

  .btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--red);
    color:#fff;
    font-family:'Jost', sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.16em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background .2s, box-shadow .2s, transform .15s;
  }

  .btn:hover{
    background:var(--red-bright);
    box-shadow:0 10px 28px -10px rgba(214,40,57,0.65);
  }

  .btn:active{ transform:scale(0.98); }

  .btn:focus-visible{
    outline:2px solid var(--red-bright);
    outline-offset:2px;
  }

  .result{
    margin-top:28px;
  }

  .result-title{
    margin:0;
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:0.06em;
    color:var(--red-bright);
    text-align:center;
  }

  .divider{
    height:1px;
    margin:18px 0;
    background:linear-gradient(90deg, transparent, rgba(214,40,57,0.45), transparent);
  }

  .result-grid{
    display:flex;
    justify-content:space-between;
    text-align:center;
    gap:8px;
  }

  .result-item{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .result-item .label{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .result-item .num{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:40px;
    line-height:1;
  }

  .summary{
    display:flex;
    justify-content:space-between;
    gap:16px;
  }

  .summary-block{
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .summary-block .summary-label{
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--red-bright);
  }

  .summary-block .summary-date{
    font-size:13px;
    color:var(--muted);
  }

  .roast{
    margin-top:18px;
    padding:20px;
    border-radius:14px;
    border:1px solid rgba(214,40,57,0.25);
    border-left:3px solid var(--red);
    background:rgba(214,40,57,0.06);
    animation:roastIn .45s ease;
  }

  @keyframes roastIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:none; }
  }

  .roast-header{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    margin-bottom:10px;
  }

  .roast-eyebrow{
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--red-bright);
  }

  .flame{
    width:16px;
    height:16px;
    color:var(--red-bright);
    animation:flicker 1.8s ease-in-out infinite;
  }

  @keyframes flicker{
    0%, 100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.6; transform:scale(.86); }
  }

  .roast-text{
    margin:0;
    font-family:'Amiri', serif;
    font-size:19px;
    line-height:2;
    text-align:right;
  }

  .watermark{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    padding-bottom:6px;
    text-align:center;
  }

  .watermark .wm-text{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:13px;
    color:var(--muted);
  }

  .watermark .code-tag{
    font-family:'Courier New', monospace;
    font-size:11px;
    letter-spacing:0.05em;
    color:var(--red-bright);
  }

  [hidden]{ display:none !important; }

  @media (max-width:380px){
    .card{ padding:24px 20px; }
    .title{ font-size:28px; }
    .result-item .num{ font-size:32px; }
    .roast-text{ font-size:17px; }
  }

  @media (prefers-reduced-motion: reduce){
    .roast, .flame{ animation:none; }
  }
</style>
</head>
<body>

<div class="page">
  <main class="card">
    <p class="eyebrow">Calculateur</p>
    <h1 class="title">Durée écoulée</h1>

    <div class="field">
      <label for="dateFrom">De</label>
      <input type="date" id="dateFrom">
    </div>

    <div class="field">
      <label for="dateTo">À</label>
      <input type="date" id="dateTo">
    </div>

    <p class="error" id="errorMsg"></p>

    <button class="btn" id="calcBtn">Calculer</button>

    <section class="result" id="result" hidden>
      <p class="result-title">Différence</p>
      <div class="divider"></div>
      <div class="result-grid">
        <div class="result-item">
          <span class="label">Années</span>
          <span class="num" id="numYears">0</span>
        </div>
        <div class="result-item">
          <span class="label">Mois</span>
          <span class="num" id="numMonths">0</span>
        </div>
        <div class="result-item">
          <span class="label">Jours</span>
          <span class="num" id="numDays">0</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="summary">
        <div class="summary-block">
          <span class="summary-label">De</span>
          <span class="summary-date" id="sumFrom">—</span>
        </div>
        <div class="summary-block">
          <span class="summary-label">À</span>
          <span class="summary-date" id="sumTo">—</span>
        </div>
      </div>
    </section>

    <section class="roast" id="roast" hidden>
      <div class="roast-header">
        <span class="roast-eyebrow">Verdict du jour</span>
        <svg class="flame" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12.5 2c.6 2.6-1 3.8-2.2 5.6-1.2 1.8-1.6 4 .2 5.4-1.2-2.4-.4-4.6 1-6.6 1.6 1.8 3.6 3.2 4.6 5.4.9 1.9 1.1 3.9.1 5.8A6.8 6.8 0 0 1 5.5 14c0-4.6 3.8-8.4 7-12z"/>
        </svg>
      </div>
      <p class="roast-text" id="roastText" dir="rtl" lang="ar"></p>
    </section>
  </main>

  <footer class="watermark">
    <span class="wm-text">© created by Hanane Ait el haj</span>
    <span class="code-tag">{&lt;/H&gt;}</span>
  </footer>
</div>

<script>
  const roasts = [
  'السرير يطلب منك الزواج رسمياً... وأنت لا تزال تفكر في "بكرة".',
  'الاثنين يغير رقمه كل أسبوع حتى لا يجدك.',
  'الجيم يرسل لك "miss you"',
  'الراتب يخرج من حسابك أسرع من أي خطة توفير.',
  'الإنجازات تنتظرك في قائمة "ربما لاحقاً" منذ سنوات.',
  'الوقت يضحك وهو يشاهدك تؤجل.',
  'الأعذار لديها الآن سيرة ذاتية أطول من إنجازاتك.',
  'الغرفة تكتب اسمك في قائمة الشكاوى الرسمية.',
  'الإلهام يضع حالته "غير متاح" منذ ٢٠٢١.',
  'السرير يحتفل بعيد صداقتكما الرابع... وأنت لا تزال تؤجل الانفصال.',
  'المنبه ينام معك الآن لأنك تؤجل الاستيقاظ.',
  'اللغة الجديدة التي كنت تريد تعلمها أصبحت الآن في المتحف.',
  'الخطط المستقبلية لديها تاريخ انتهاء صلاحية.',
  'الجيم يفكر في بيع اشتراكك لشخص أكثر التزاماً.',
  'الإنجازات تكتب لك "ربما في النسخة القادمة".',
  'الوقت يرسل لك فواتير متأخرة منذ أربع سنوات.',
  'الخمس دقائق تحولت إلى فيلم وثائقي عن التأجيل.',
  'السرير يطلب منك دفع إيجار شهري.',
  'الاثنين يبدأ إجازته الرسمية كلما اقتربت منه.',
  'الإنجازات تنتظر في تطبيق "ربما غداً".',
  'الوقت يمر بسرعة وأنت لا تزال في وضع "التحميل".',
  'الإلهام يتركك على "typing..." إلى الأبد.',
  'السرير يطلب منك الالتزام بعلاقة رسمية.',
  'الغرفة تطلب منك الانتقال إلى مكان آخر.',
  'الجيم يعرف اسمك فقط من قائمة الغائبين.',
  'الراتب يختفي أسرع من أي خطة مالية.',
  'الإلهام يضعك في قائمة "الانتظار إلى أجل غير مسمى".',
  'الغد يعيش الآن في مدينة أخرى.',
  'الخمس دقائق أصبحت الآن مديرة في شركة كبيرة.',
  'السرير يحتفل بذكرى السنوات الأربع معك.',
  'الاثنين يرفض الرد على مكالماتك.',
  'الإنجازات تطلب منك تحديث التطبيق.',
  'الوقت يضحك عليك وهو يمر.',
  'الإلهام يضعك في قائمة الحظر.',
  'السرير يطلب منك دفع فواتير الكهرباء.',
  'الغرفة تكتب مذكرات عن إهمالك.',
  'الجيم يرسل لك إشعارات "last seen" منذ سنوات.',
  'اللغة الجديدة تنتظرك في قائمة "المهملات".',
  'الخطط تكتب سيرتها الذاتية بدونك.',
  'الراتب يذهب في إجازة كل شهر.',
  'الإلهام يتركك في "القراءة" إلى الأبد.',
  'الغد يقول "أنا مشغول" كلما حاولت الاتصال به.',
  'الخمس دقائق تطلب منك الطلاق الرسمي.',
  'الاثنين يهرب إلى عطلة نهاية الأسبوع مبكراً.',
  'الإنجازات تنتظر في "البريد الوارد" منذ سنوات.',
  'الوقت يرسل لك تذكيرات متأخرة.',
  'الإلهام الآن يعمل في شركة منافسة.',
  'السرير يحتفل بذكرى الصداقة السنوية.',
  'الغرفة تكتب شكاوى رسمية ضدك.',
  'الجيم يفكر في تغيير اسمه حتى لا تعرفه.',
  'الراتب يخرج من النافذة كل شهر.',
  'الإلهام يضعك في قائمة الحظر النهائية.',
  'الغد يعيش الآن حياة سعيدة بدون تأجيل.',
  'الخمس دقائق تكتب كتاباً عن علاقتكما.',
  'الإنجازات تكتب لك "ربما في الحياة القادمة".'
];

  let lastIndex = -1;

  const dateFrom = document.getElementById('dateFrom');
  const dateTo = document.getElementById('dateTo');
  const errorMsg = document.getElementById('errorMsg');
  const result = document.getElementById('result');
  const roastSection = document.getElementById('roast');
  const roastText = document.getElementById('roastText');
  const calcBtn = document.getElementById('calcBtn');

  function pad(n){ return String(n).padStart(2, '0'); }

  function todayStr(){
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  }

  function parseDate(str){
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function diffDates(d1, d2){
    const start = d1 < d2 ? d1 : d2;
    const end = d1 < d2 ? d2 : d1;

    let years = end.getFullYear() - start.getFullYear();
    let months = end.getMonth() - start.getMonth();
    let days = end.getDate() - start.getDate();

    if (days < 0){
      months -= 1;
      const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
      days += prevMonth.getDate();
    }

    if (months < 0){
      years -= 1;
      months += 12;
    }

    return { years, months, days, start, end };
  }

  function formatDateFr(d){
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function pickRoast(){
    if (roasts.length === 1) return roasts[0];
    let idx;
    do {
      idx = Math.floor(Math.random() * roasts.length);
    } while (idx === lastIndex);
    lastIndex = idx;
    return roasts[idx];
  }

  function retriggerAnimation(el){
    el.style.animation = 'none';
    requestAnimationFrame(() => {
      el.style.animation = '';
    });
  }

  dateTo.value = todayStr();

  calcBtn.addEventListener('click', () => {
    errorMsg.textContent = '';

    if (!dateFrom.value || !dateTo.value){
      errorMsg.textContent = 'Choisis les deux dates.';
      return;
    }

    const d1 = parseDate(dateFrom.value);
    const d2 = parseDate(dateTo.value);
    const { years, months, days, start, end } = diffDates(d1, d2);

    document.getElementById('numYears').textContent = years;
    document.getElementById('numMonths').textContent = months;
    document.getElementById('numDays').textContent = days;
    document.getElementById('sumFrom').textContent = formatDateFr(start);
    document.getElementById('sumTo').textContent = formatDateFr(end);

    result.hidden = false;
    retriggerAnimation(result);

    roastText.textContent = pickRoast();
    roastSection.hidden = false;
    retriggerAnimation(roastSection);
  });
</script>

</body>
</html>
